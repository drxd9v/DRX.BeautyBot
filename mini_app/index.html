<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DRX.beauty Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-bg app-bg--top"></div>
  <div class="app-bg app-bg--bottom"></div>

  <main class="app-shell" aria-live="polite">
    <header class="topbar">
      <div class="topbar__brand">
        <span class="topbar__eyebrow">DRX.beauty</span>
        <strong class="topbar__title">Mini App</strong>
      </div>
      <div id="status-pill" class="status-pill">Загрузка...</div>
    </header>

    <section id="app" class="app-content">
      <div class="loading-state">
        <div class="loading-state__spark"></div>
        <h1 class="loading-state__title">Собираем экран записи</h1>
        <p class="loading-state__text">Подключаем данные и готовим клиентский путь внутри Telegram.</p>
      </div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
